{%- if page.comments != false and jekyll.environment == "production" -%}
<script src="https://giscus.app/client.js"
        data-repo="{{ site.gisqus.repo }}"
        data-repo-id="{{ site.gisqus.repo_id }}"
        data-category="{{ site.gisqus.category }}"
        data-category-id="{{ site.gisqus.category_id }}"
        data-mapping="{{ site.gisqus.mapping }}"
        data-strict="{{ site.gisqus.strict }}"
        data-reactions-enabled="{{ site.gisqus.reactions_enabled }}"
        data-emit-metadata="{{ site.gisqus.emit_metadata }}"
        data-input-position="top"
        data-theme="{{ site.gisqus.theme }}"
        data-lang="{{ site.gisqus.lang }}"
        data-loading="{{ site.gisqus.loading }}"
        crossorigin="anonymous"
        async>
</script>
{%- endif -%}
